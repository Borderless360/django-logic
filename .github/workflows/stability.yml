name: Stability Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Nightly at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  stability:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: django_logic_test
          POSTGRES_USER: django_logic
          POSTGRES_PASSWORD: django_logic
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U django_logic -d django_logic_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install psycopg2-binary

      - name: Run stability tests
        env:
          DJANGO_SETTINGS_MODULE: tests.settings_stability
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5433"
          POSTGRES_DB: django_logic_test
          POSTGRES_USER: django_logic
          POSTGRES_PASSWORD: django_logic
          REDIS_URL: redis://localhost:6380/0
        run: |
          python tests/manage.py test tests.stability --verbosity=2 --tag=stability

      - name: Run stability tests (stress - 10 threads)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          DJANGO_SETTINGS_MODULE: tests.settings_stability
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5433"
          POSTGRES_DB: django_logic_test
          POSTGRES_USER: django_logic
          POSTGRES_PASSWORD: django_logic
          REDIS_URL: redis://localhost:6380/0
          STABILITY_STRESS_MODE: "1"
        run: |
          python tests/manage.py test tests.stability --verbosity=2 --tag=stability
